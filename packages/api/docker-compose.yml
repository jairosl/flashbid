services:
  postgres:
    image: postgres:17-alpine
    container_name: flashbid_pg
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flashbid
    ports:
      - "5432:5432"
    volumes:
      - pg_flashbid_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flashbid"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: flashbid_redis
    restart: always
    ports:
      - "6378:6379"
    volumes:
      - redis_flashbid_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_flashbid_data:
  redis_flashbid_data:
